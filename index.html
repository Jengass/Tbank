<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoxProM+ Mobile</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0a0a0c;
            color: #00ff66;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            width: 100%;
            max-width: 450px;
            background: #141419;
            border: 2px solid #00ff66;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0px 10px 30px rgba(0, 255, 102, 0.15);
            text-align: center;
        }
        h2 {
            margin-top: 0;
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.5);
        }
        p {
            color: #8a8a93;
            font-size: 15px;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            height: 54px;
            background: #000000;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            text-align: center;
            font-size: 16px;
            margin-bottom: 15px;
            padding: 0 15px;
            outline: none;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: #00ff66;
            box-shadow: 0 0 8px rgba(0, 255, 102, 0.3);
        }
        button {
            width: 100%;
            height: 54px;
            background: #00ff66;
            color: #000;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            background: #00cc52;
            transform: scale(0.98);
        }
        .loading-box {
            display: none;
            margin-top: 25px;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 255, 102, 0.2);
            border-top-color: #00ff66;
            border-radius: 50%;
            margin: 0 auto 10px auto;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result-box {
            display: none;
            margin-top: 25px;
            text-align: left;
            background: #1c1c24;
            border-left: 4px solid #00ff66;
            padding: 15px;
            border-radius: 0 10px 10px 0;
            font-size: 15px;
            line-height: 1.6;
            color: #e1e1e6;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-title {
            color: #00ff66;
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .info-row {
            margin-bottom: 6px;
        }
        .info-label {
            color: #8a8a93;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>DoxProM+</h2>
    <p>Мобильный модуль сканирования</p>
    
    <input type="text" id="userInput" placeholder="Ник, ФИО или номер телефона" autocomplete="off">
    <button onclick="runSearch()">Поиск в базе данных</button>

    <div id="loader" class="loading-box">
        <div class="spinner"></div>
        <div style="font-size: 14px;">Подключение к серверам...</div>
    </div>

    <div id="result" class="result-box">
        <span class="result-title">● ОБЪЕКТ НАЙДЕН (БАЗА ОБНОВЛЕНА)</span>
        <div class="info-row"><span class="info-label">ФИО:</span> Рубцов Сергей Игоревич</div>
        <div class="info-row"><span class="info-label">Возраст:</span> 38 лет</div>
        <div class="info-row"><span class="info-label">В браке:</span> Да</div>
        <div class="info-row"><span class="info-label">Жена:</span> Рубцова Анастасия Владимировна (43 года)</div>
        <div class="info-row"><span class="info-label">Сын:</span> Рубцов Артём Сергеевич (12 лет)</div>
    </div>
</div>

<script>
function runSearch() {
    var val = document.getElementById("userInput").value.trim();
    if(val === "") {
        alert("Введите хоть какие-то данные!");
        return;
    }

    // Скрываем клавиатуру на смартфонах при клике
    document.getElementById("userInput").blur();

    document.getElementById("result").style.display = "none";
    document.getElementById("loader").style.display = "block";

    setTimeout(function() {
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").style.display = "block";
    }, 2500); // 2.5 секунды имитации поиска
}
</script>

</body>
</html>
